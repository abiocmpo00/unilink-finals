<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLink - Profile</title>
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/components.css">
    <link rel="stylesheet" href="../src/css/pages.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Reusable Sidebar Component -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <a href="../index.html">UniLink</a>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="chat.html">💬 Chat Hub</a></li>
                <li><a href="profile.html" class="active">👤 Profile</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="../index.html" class="btn-logout">🚪 Logout</a>
            </div>
        </aside>

        <!-- Profile Settings Content Area -->
        <main class="profile-content">
            <header class="content-header">
                <h2>Account Settings</h2>
                <p>Manage your public identity, roles, and platform settings.</p>
            </header>

            <!-- Role Simulator Dropdown (For testing out your three views!) -->
            <div class="role-selector-box">
                <label for="roleSimulator"><strong>Simulate Account Type:</strong></label>
                <select id="roleSimulator">
                    <option value="student">Student Account</option>
                    <option value="teacher">Teacher Account</option>
                    <option value="admin">Administrator Account</option>
                </select>
            </div>

            <div class="profile-grid">
                <!-- Left Column: Avatar Card -->
                <div class="profile-card avatar-card">
                    <div class="profile-picture">👤</div>
                    <h3 id="displayProfileName">River Daz</h3>
                    <span class="role-badge badge-student" id="displayRoleBadge">Student</span>
                    <p class="profile-joined">Member since 2026</p>
                </div>

                <!-- Right Column: Form Settings Fields -->
                <div class="profile-card details-card">
                    <h3>Personal Information</h3>
                    <form class="profile-form" id="profileForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="profileName">Full Name</label>
                                <input type="text" id="profileName" value="River Daz">
                            </div>
                            <div class="form-group">
                                <label for="profileEmail">Email Address</label>
                                <input type="email" id="profileEmail" value="riverdaz@unilink.edu">
                            </div>
                        </div>

                        <!-- Dynamic Role-Specific Section -->
                        <div id="dynamicRoleFields" class="role-specific-section">
                            <!-- JavaScript will inject student, teacher, or admin fields here -->
                        </div>

                        <button type="submit" class="btn-save-profile">Save Changes</button>
                    </form>
                </div>
            </div>
        </main>

    </div>

    <!-- Wire up profile role selector script -->
    <script src="../src/js/profile.js"></script>
</body>
</html>
