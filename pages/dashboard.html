<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLink - Dashboard</title>
    <!-- Relative paths point up one folder back to src -->
    <link rel="stylesheet" href="../src/css/style.css">
    <link rel="stylesheet" href="../src/css/components.css">
    <link rel="stylesheet" href="../src/css/pages.css">
</head>
<body>

    <!-- Main App Layout Container -->
    <div class="app-container">
        
        <!-- Shared Sidebar Component -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <a href="../index.html">UniLink</a>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html" class="active">📊 Dashboard</a></li>
                <li><a href="chat.html">💬 Chat Hub</a></li>
                <li><a href="profile.html">👤 Profile</a></li>
            </ul>
            <div class="sidebar-footer">
                <a href="../index.html" class="btn-logout">🚪 Logout</a>
            </div>
        </aside>

        <!-- Main Workspace Content -->
        <main class="dashboard-content">
            <header class="content-header">
                <h2>Welcome Back!</h2>
                <p>Here is what's happening across your link network today.</p>
            </header>

            <!-- Quick Stats Row -->
            <section class="stats-grid">
                <div class="stat-card">
                    <h3>Active Chats</h3>
                    <p class="stat-number">0</p>
                </div>
                <div class="stat-card">
                    <h3>Project Teams</h3>
                    <p class="stat-number">0</p>
                </div>
                <div class="stat-card">
                    <h3>Unread Messages</h3>
                    <p class="stat-number" id="messageCounter" style="color: var(--primary-color);">0</p>
                </div>
            </section>

            <!-- Placeholder for dynamic app features -->
            <section class="recent-activity">
                <h3>Recent Activity</h3>
                <div class="activity-list">
                    <p class="empty-notice">No new updates. You're completely caught up!</p>
                </div>
            </section>
        </main>

    </div>
    <script type="module" src="../src/js/dashboard.js"></script>
</body>
</html>
